# mouse mode on to enable clicking into panes
set -g mouse on

# ctrl-a as secondary prefix (mirrors oh-my-tmux behaviour on Mac)
set -g prefix2 C-a
bind C-a send-prefix -2

set -g set-clipboard on
set -g mode-keys vi

# big history
set-option -g history-limit 50000

# Tmux lags the esc for some reason which is annoying for vim
# this makes escape quicker
set -g escape-time 10

# BINDINGS
# split window horizontally
bind - split-window -v -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
# split window vertically
bind | split-window -h -c "#{pane_current_path}"
bind h split-window -h -c "#{pane_current_path}"
# reload tmux conifg
bind r source-file ~/.tmux.conf
# move panes with ctrl+hjkl
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
# resize panes with prefix + uiop
bind  u resize-pane -U 5
bind  p resize-pane -D 5
bind  i resize-pane -L 5
bind  o resize-pane -R 5

set -g word-separators ""  # Set "word" to be whitespace delimitted
# Double click to select word
bind-key -n DoubleClick1Pane \
    select-pane \; \
    copy-mode -M \; \
    send-keys -X select-word \; \
    run-shell "sleep .4s" \; \
    send-keys -X copy-selection-and-cancel \;


# Use vim keybindings in copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Renumber windows when one is closed
set-option -g renumber-windows on

# Use zsh for tmux
set-option -g default-shell "${SHELL}"
set -g default-command "${SHELL}"

# default-terminal sets the $TERM env variable inside tmux, the default value is tmux-256color 
# but currently our singularity images don't have this in /etc/terminfo, /lib/terminfo, or /usr/share/terminfo so this cannot be used.
# screen.xterm-256-color has the same colors as tmux-256color and xterm-256color but lacks some functionality such as italics
# Experimentation has suggested xterm-256color seems to work directly in singularity and has the same colors as tmux-256color and italics also work
set -g default-terminal "xterm-256color"
# tell Tmux that outside terminal supports true color
set -ga terminal-overrides ",xterm-256color*:Tc";

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# sane scrolling
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# oh-my-tmux theme: minimal status bar
# empty right side, left side shows only session name
tmux_conf_theme_status_right=''
tmux_conf_theme_status_left=' ❐ #S '

# -- multi-pane visual overview ------------------------------------------------
# NOTE: oh-my-tmux's theme engine runs *after* this file and recomputes
# window-style / pane-border-style / window-status-activity-style from its own
# tmux_conf_theme_* variables, so these must be set as variables (not `set -g`)
# or they get clobbered. Options oh-my-tmux does NOT manage are set directly.

# (1) [removed] We no longer dim inactive panes — graying the text made
#     background terminal output hard to read. The green active-pane border
#     (item 2) is enough to show which pane is focused, and every pane now
#     renders in the terminal's normal colors.

# (2) Pane borders: dim gray normally, bright green for the active pane.
tmux_conf_theme_pane_border='colour240'
tmux_conf_theme_pane_active_border='colour46'
set -g pane-border-lines heavy        # thicker border glyphs (oh-my-tmux leaves this alone)
set -g pane-border-indicators colour  # tint the border edge near the active pane

# (3) Per-pane title bar: "<index> <command>" + Claude Code run-state.
#     @claude_state is a per-pane option set by Claude Code hooks (see
#     ~/.claude/settings.json): running -> blue, waiting -> amber, done -> green.
set -g pane-border-status top
set -g pane-border-format ' #P #{pane_current_command}#{?#{==:#{@claude_state},running}, #[fg=colour39]● working#[default],}#{?#{==:#{@claude_state},waiting}, #[fg=colour214]● needs input#[default],}#{?#{==:#{@claude_state},done}, #[fg=colour46]● done#[default],} '

# (4) Activity monitoring: light up windows in the status bar (green) when a
#     background pane prints output — handy for watching long-running jobs.
#     monitor-activity / visual-activity are already on in the oh-my-tmux base.
tmux_conf_theme_window_status_activity_fg='colour46'
tmux_conf_theme_window_status_activity_attr='bold'

